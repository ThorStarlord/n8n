post:
  x-eov-operation-id: createWorkflow
  x-eov-operation-handler: v1/handlers/workflows/workflows.handler
  tags:
    - Workflow
  summary: Create a workflow
  description: Create a workflow in your instance.
  parameters:
    - name: strict
      in: query
      required: false
      description: >
        When `true`, the request fails with 422 if any credential reference in the workflow
        cannot be resolved to a known credential in this instance. When omitted or `false`,
        the workflow is saved and unresolvable references are reported as warnings in the
        response body.
      schema:
        type: boolean
        default: false
        example: true
  requestBody:
    description: Created workflow object.
    content:
      application/json:
        schema:
          $ref: '../schemas/workflow.yml'
    required: true
  responses:
    '200':
      description: A workflow object. May include `credentialResolutionWarnings` when one or more credential references could not be resolved.
      content:
        application/json:
          schema:
            $ref: '../schemas/workflowWithWarnings.yml'
    '400':
      $ref: '../../../../shared/spec/responses/badRequest.yml'
    '401':
      $ref: '../../../../shared/spec/responses/unauthorized.yml'
    '404':
      $ref: '../../../../shared/spec/responses/notFound.yml'
    '422':
      $ref: '../../../../shared/spec/responses/unprocessableEntity.yml'
get:
  x-eov-operation-id: getWorkflows
  x-eov-operation-handler: v1/handlers/workflows/workflows.handler
  tags:
    - Workflow
  summary: Retrieve all workflows
  description: Retrieve all workflows from your instance.
  parameters:
    - name: active
      in: query
      schema:
        type: boolean
        example: true
    - name: tags
      in: query
      required: false
      explode: false
      allowReserved: true
      schema:
        type: string
        example: test,production
    - name: name
      in: query
      required: false
      explode: false
      allowReserved: true
      schema:
        type: string
        example: My Workflow
    - name: projectId
      in: query
      required: false
      explode: false
      allowReserved: true
      schema:
        type: string
        example: VmwOO9HeTEj20kxM
    - name: excludePinnedData
      in: query
      required: false
      description: Set this to avoid retrieving pinned data
      schema:
        type: boolean
        example: true
    - name: parentFolderId
      in: query
      required: false
      description: Filter by parent folder ID
      schema:
        type: string
        example: VmwOO9HeTEj20kxM
    - name: recursive
      in: query
      required: false
      description: Set to true to include sub-folders (defaults to true)
      schema:
        type: boolean
        example: true
    - $ref: '../../../../shared/spec/parameters/limit.yml'
    - $ref: '../../../../shared/spec/parameters/cursor.yml'
  responses:
    '200':
      description: Operation successful.
      content:
        application/json:
          schema:
            $ref: '../schemas/workflowList.yml'
    '401':
      $ref: '../../../../shared/spec/responses/unauthorized.yml'
