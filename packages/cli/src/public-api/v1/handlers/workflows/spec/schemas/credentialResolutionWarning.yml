type: object
additionalProperties: false
required:
  - nodeName
  - credentialType
  - reason
description: Warning produced when a credential reference in a workflow node could not be resolved to a known credential.
properties:
  nodeName:
    type: string
    description: Name of the node that contains the unresolvable credential reference.
    example: HTTP Request
  credentialType:
    type: string
    description: The credential type that could not be resolved.
    example: httpBasicAuth
  attemptedId:
    type: string
    nullable: true
    description: Credential ID that was present in the workflow JSON but could not be found.
    example: abc123
  attemptedName:
    type: string
    nullable: true
    description: Credential name that was present in the workflow JSON but could not be resolved.
    example: My HTTP Basic Auth
  reason:
    type: string
    description: >
      `not_found` — no credential with that ID or name exists in the project.
      `ambiguous_name` — multiple credentials share the same name and type, so the correct one cannot be inferred.
    enum:
      - not_found
      - ambiguous_name
