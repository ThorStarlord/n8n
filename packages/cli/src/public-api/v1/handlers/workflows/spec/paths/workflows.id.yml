get:
  x-eov-operation-id: getWorkflow
  x-eov-operation-handler: v1/handlers/workflows/workflows.handler
  tags:
    - Workflow
  summary: Retrieve a workflow
  description: Retrieve a workflow.
  parameters:
    - name: excludePinnedData
      in: query
      required: false
      description: Set this to avoid retrieving pinned data
      schema:
        type: boolean
        example: true
    - $ref: '../schemas/parameters/workflowId.yml'
  responses:
    '200':
      description: Operation successful.
      content:
        application/json:
          schema:
            $ref: '../schemas/workflow.yml'
    '401':
      $ref: '../../../../shared/spec/responses/unauthorized.yml'
    '404':
      $ref: '../../../../shared/spec/responses/notFound.yml'
delete:
  x-eov-operation-id: deleteWorkflow
  x-eov-operation-handler: v1/handlers/workflows/workflows.handler
  tags:
    - Workflow
  summary: Delete a workflow
  description: Delete a workflow.
  parameters:
    - $ref: '../schemas/parameters/workflowId.yml'
  responses:
    '200':
      description: Operation successful.
      content:
        application/json:
          schema:
            $ref: '../schemas/workflow.yml'
    '401':
      $ref: '../../../../shared/spec/responses/unauthorized.yml'
    '404':
      $ref: '../../../../shared/spec/responses/notFound.yml'
put:
  x-eov-operation-id: updateWorkflow
  x-eov-operation-handler: v1/handlers/workflows/workflows.handler
  tags:
    - Workflow
  summary: Update a workflow
  description: Update a workflow. If the workflow is published, the updated version will be automatically re-published.
  parameters:
    - $ref: '../schemas/parameters/workflowId.yml'
    - name: strict
      in: query
      required: false
      description: >
        When `true`, the request fails with 422 if any credential reference in the workflow
        cannot be resolved to a known credential in this instance. When omitted or `false`,
        the workflow is saved and unresolvable references are reported as warnings in the
        response body.
      schema:
        type: boolean
        default: false
        example: true
  requestBody:
    description: Updated workflow object.
    content:
      application/json:
        schema:
          $ref: '../schemas/workflow.yml'
    required: true
  responses:
    '200':
      description: Workflow object. May include `credentialResolutionWarnings` when one or more credential references could not be resolved.
      content:
        application/json:
          schema:
            $ref: '../schemas/workflowWithWarnings.yml'
    '400':
      $ref: '../../../../shared/spec/responses/badRequest.yml'
    '401':
      $ref: '../../../../shared/spec/responses/unauthorized.yml'
    '404':
      $ref: '../../../../shared/spec/responses/notFound.yml'
    '422':
      $ref: '../../../../shared/spec/responses/unprocessableEntity.yml'
