type: object
additionalProperties: true
properties:
  variables:
    type: object
    properties:
      added:
        type: array
        items:
          type: string
      changed:
        type: array
        items:
          type: string
  credentials:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
  workflows:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        publishingError:
          type: string
          description: Error message if the workflow could not be published during import.
        credentialResolutionWarnings:
          type: array
          description: >
            Warnings about credential references in this workflow that could not be resolved to a
            known credential in the target instance. Omitted when all credentials resolved successfully.
          items:
            $ref: '../../../workflows/spec/schemas/credentialResolutionWarning.yml'
  tags:
    type: object
    properties:
      tags:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
      mappings:
        type: array
        items:
          type: object
          properties:
            workflowId:
              type: string
            tagId:
              type: string
